<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schocken Tool</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --primary: #3b82f6; 
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --accent: #03dac6;
            --danger: #ef4444;
            --warning: #f59e0b;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }
        h1 { text-align: center; color: var(--primary); margin-bottom: 5px; }
        .subtitle { text-align: center; color: var(--text-muted); font-size: 0.9em; margin-bottom: 30px; font-style: italic; }
        .card { background-color: var(--card-bg); border-radius: 12px; padding: 15px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        label { display: block; font-size: 0.9em; margin-bottom: 5px; color: var(--text-muted); }
        select, input[type="number"] { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #333; background-color: #2c2c2c; color: white; font-size: 1em; box-sizing: border-box; }
        .player-row { border-left: 4px solid #333; padding-left: 10px; margin-bottom: 25px; transition: all 0.3s; }
        .player-row.is-me { border-left-color: var(--primary); background-color: rgba(59, 130, 246, 0.05); border-radius: 0 8px 8px 0; }
        .player-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .player-header h3 { margin: 0; font-size: 1.1em; }
        .dice-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 10px; }
        .dice-select { text-align: center; font-size: 1.2em; font-weight: bold; }
        .btn { display: block; width: 100%; padding: 15px; background-color: var(--primary); color: #fff; border: none; border-radius: 8px; font-size: 1.2em; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .btn:active { background-color: #2563eb; transform: scale(0.98); }
        .results { margin-top: 20px; padding: 15px; background-color: #2a2a2a; border-radius: 8px; text-align: center; }
        
        .split-probs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .split-box { background-color: #333; padding: 10px; border-radius: 8px; display: flex; flex-direction: column; justify-content: center; }
        .split-box .prob-value { font-size: 1.6em; margin: 5px 0 0 0; }
        .small-label { font-size: 0.75em; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        
        .prob-value { font-size: 2em; font-weight: bold; margin: 10px 0; }
        .win-color { color: var(--accent); }
        .advice-box { margin-top: 20px; padding: 15px; background-color: rgba(59, 130, 246, 0.1); border-left: 4px solid var(--primary); border-radius: 0 8px 8px 0; text-align: left; font-size: 0.95em; line-height: 1.4; }
        .hand-name { font-size: 1.2em; margin-bottom: 10px; color: #fff; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .roast-text { margin-top: 15px; font-style: italic; color: #ffb74d; font-size: 0.9em; border-top: 1px solid rgba(255, 255, 255, 0.1); padding-top: 10px; }
        .pool-alert { color: var(--danger); font-weight: bold; font-size: 1.2em; text-transform: uppercase; display: block; margin-top: 10px; text-align: center; animation: blink 1s linear infinite; }
        
        @keyframes blink { 50% { opacity: 0; } }
        #loading { display: none; text-align: center; color: var(--primary); margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Schocken Chancen</h1>
    <div class="subtitle">... aber Schocken heißt das Spiel!</div>

    <div class="card settings-grid">
        <div>
            <label for="playerCount">Anzahl Spieler</label>
            <select id="playerCount" onchange="renderPlayers()">
                <option value="2">2 Spieler</option>
                <option value="3">3 Spieler</option>
                <option value="4">4 Spieler</option>
                <option value="5">5 Spieler</option>
                <option value="6" selected>6 Spieler</option>
                <option value="7">7 Spieler</option>
                <option value="8">8 Spieler</option>
                <option value="9">9 Spieler</option>
                <option value="10">10 Spieler</option>
            </select>
        </div>
        <div>
            <label for="maxRolls">Max. Würfe d. Runde</label>
            <select id="maxRolls" onchange="updateDefaultRolls()">
                <option value="1">1 (Direkt)</option>
                <option value="2">2 Würfe</option>
                <option value="3" selected>3 Würfe</option>
            </select>
        </div>
    </div>

    <div class="card" id="playersContainer"></div>

    <button class="btn" onclick="startSimulation()">Chancen & Tipp berechnen</button>
    <div id="loading">Berechne Parallel-Universen...</div>

    <div class="card results" id="resultsCard" style="display: none;">
        
        <div id="singleMode" style="display: none;">
            <label>Wahrscheinlichkeit die Runde zu gewinnen:</label>
            <div class="prob-value win-color" id="probWinSingle">--%</div>
            <hr style="border-color: #444; margin: 15px 0;">
            <label>Wahrscheinlichkeit NICHT zu verlieren (kein Deckel):</label>
            <div class="prob-value" id="probNotLoseSingle" style="color: #fff;">--%</div>
        </div>

        <div id="splitMode" style="display: none;">
            <label style="color: #fff; margin-bottom: 8px;">NICHT zu verlieren (kein Deckel):</label>
            <div class="split-probs">
                <div class="split-box">
                    <div class="small-label">Aktuell (Stehen)</div>
                    <div class="prob-value" id="probNotLoseCurrent" style="color: #fff;">--%</div>
                </div>
                <div class="split-box">
                    <div class="small-label">Potenziell (Würfeln)</div>
                    <div class="prob-value" id="probNotLosePotential" style="color: #fff;">--%</div>
                </div>
            </div>
            
            <label style="color: var(--accent); margin-bottom: 8px;">Die Runde zu gewinnen:</label>
            <div class="split-probs">
                <div class="split-box">
                    <div class="small-label">Aktuell (Stehen)</div>
                    <div class="prob-value win-color" id="probWinCurrent">--%</div>
                </div>
                <div class="split-box">
                    <div class="small-label">Potenziell (Würfeln)</div>
                    <div class="prob-value win-color" id="probWinPotential">--%</div>
                </div>
            </div>
        </div>
        
        <div class="advice-box" id="adviceBox" style="display: none;">
            <div class="hand-name" id="handNameDisplay"></div>
            <span id="adviceText"></span>
        </div>
    </div>

    <script>
        const roasts = [
            "Was für ein bodenloser Schmutz-Wurf! Hast du die Würfel mit dem Hintern geworfen?",
            "Du ziehst den IQ am ganzen Tisch runter. Zahl die Lokalrunde und heul leise!",
            "Wenn Dummheit wehtun würde, wärst du schon längst auf der Intensivstation. Erbärmlich!",
            "Das ist kein Pech mehr, das ist geistige Insolvenz. Bereit für den Deckel?",
            "Da kriegt man ja Augenkrebs bei so einem Wurf. Du bist eine Schande für jeden Stammtisch!",
            "Du würfelst wie ein blinder Grobmotoriker mit zwei linken Händen. Mach das Portemonnaie auf!",
            "Purer Abfall! Selbst mein toter Goldfisch hätte eine bessere Hausnummer gewürfelt.",
            "Ist das dein Ernst? Meine Oma wirft im Koma bessere Zahlen. Zahltag!",
            "Du bist der Grund, warum auf Shampoo 'Nicht trinken' steht. Absolute Vollkatastrophe!",
            "Schlechter kann man eigentlich nur würfeln, wenn man es mit Absicht macht. Ekelhaft.",
            "Dein Wurf ist wie alkoholfreies Bier: Sinnlos, traurig und macht alle am Tisch wütend.",
            "Man sagt ja, der Klügere gibt nach. Bei dem Wurf hast du wohl komplett nachgegeben.",
            "Ein Trauerspiel in drei Würfeln. Da hilft nur noch beten oder zahlen.",
            "Solche Würfe sind der Grund, warum du so beliebt bist: Du zahlst immer das Bier!",
            "Du würfelst wie ein kastrierter Pavian im Vollrausch. Raus mit der Kohle!",
            "Sensationell! Du hast die Kunst perfektioniert, mit drei Würfeln absolut gar nichts zu erreichen.",
            "Da kannst du den Würfelbecher auch gleich direkt fressen. Zahl die Runde!",
            "Wer hat dir eigentlich das Würfeln beigebracht? Den verklagen wir auf Schmerzensgeld!",
            "Ein Wurf, den nur eine blinde Mutter lieben kann. Und selbst die würde den Deckel weitergeben.",
            "Selbst mein Hund kackt schönere Hausnummern auf den Rasen. Gib auf!"
        ];

        // --- UI LOGIK ---
        function renderPlayers() {
            const container = document.getElementById('playersContainer');
            const playerCountSelect = document.getElementById('playerCount');
            const maxRollsSelect = document.getElementById('maxRolls');
            
            const playerCount = parseInt(playerCountSelect.value);
            const maxRolls = parseInt(maxRollsSelect.value);
            
            // Speichern der Einstellungen im LocalStorage für den nächsten Reload
            localStorage.setItem('schockenPlayerCount', playerCount);
            localStorage.setItem('schockenMaxRolls', maxRolls);
            
            let rollOpts = '<option value="0">0 Würfe (Noch nicht dran)</option>';
            for(let r=1; r<=maxRolls; r++) {
                rollOpts += `<option value="${r}">${r} ${r===1 ? 'Wurf' : 'Würfe'}</option>`;
            }

            container.innerHTML = ''; 

            for (let i = 1; i <= playerCount; i++) {
                const isMeCheck = i === 1 ? 'checked' : '';
                
                const playerHtml = `
                    <div class="player-row" id="playerRow${i}">
                        <div class="player-header">
                            <h3>Spieler ${i}</h3>
                            <label><input type="radio" name="isMe" value="${i}" ${isMeCheck} onchange="highlightMe()"> Das bin ich</label>
                        </div>
                        <label>Bekannte Würfel (0 = verdeckt)</label>
                        <div class="dice-grid">
                            <select class="dice-select d1"><option value="0">?</option><option value="6">6</option><option value="5">5</option><option value="4">4</option><option value="3">3</option><option value="2">2</option><option value="1">1</option></select>
                            <select class="dice-select d2"><option value="0">?</option><option value="6">6</option><option value="5">5</option><option value="4">4</option><option value="3">3</option><option value="2">2</option><option value="1">1</option></select>
                            <select class="dice-select d3"><option value="0">?</option><option value="6">6</option><option value="5">5</option><option value="4">4</option><option value="3">3</option><option value="2">2</option><option value="1">1</option></select>
                        </div>
                        <div style="width: 100%;">
                            <label>Bisherige Würfe</label>
                            <select class="roll-count">
                                ${rollOpts}
                            </select>
                        </div>
                    </div>
                `;
                container.innerHTML += playerHtml;
            }
            highlightMe();
        }

        function updateDefaultRolls() { 
            const maxRollsSelect = document.getElementById('maxRolls');
            const maxRolls = parseInt(maxRollsSelect.value);
            
            // Speichern der Einstellung im LocalStorage
            localStorage.setItem('schockenMaxRolls', maxRolls);
            
            const rollSelects = document.querySelectorAll('.roll-count');
            
            rollSelects.forEach(select => {
                const currentVal = parseInt(select.value);
                let rollOpts = '<option value="0">0 Würfe (Noch nicht dran)</option>';
                for(let r=1; r<=maxRolls; r++) {
                    rollOpts += `<option value="${r}">${r} ${r===1 ? 'Wurf' : 'Würfe'}</option>`;
                }
                select.innerHTML = rollOpts;
                select.value = currentVal <= maxRolls ? currentVal : maxRolls;
            });
            highlightMe(); 
        }

        function highlightMe() {
            const rows = document.querySelectorAll('.player-row');
            rows.forEach(row => row.classList.remove('is-me'));
            
            const selectedRadio = document.querySelector('input[name="isMe"]:checked');
            if(!selectedRadio) return;
            
            const selected = parseInt(selectedRadio.value);
            document.getElementById('playerRow' + selected).classList.add('is-me');

            const maxRolls = parseInt(document.getElementById('maxRolls').value);
            const playerCount = parseInt(document.getElementById('playerCount').value);

            for (let i = 1; i <= playerCount; i++) {
                const rollSelect = document.querySelector(`#playerRow${i} .roll-count`);
                if (i < selected) rollSelect.value = maxRolls;
                else if (i === selected) rollSelect.value = "1";
                else rollSelect.value = "0";
            }
        }

        // --- LADE GESPEICHERTE EINSTELLUNGEN BEIM START ---
        window.onload = () => {
            const savedPlayerCount = localStorage.getItem('schockenPlayerCount');
            const savedMaxRolls = localStorage.getItem('schockenMaxRolls');
            
            if (savedPlayerCount) {
                document.getElementById('playerCount').value = savedPlayerCount;
            }
            if (savedMaxRolls) {
                document.getElementById('maxRolls').value = savedMaxRolls;
            }
            
            // Render Players baut alles korrekt mit den geladenen Werten auf
            renderPlayers();
        };

        // --- MONTE CARLO SIMULATION LOGIK ---
        function rollDie() { return Math.floor(Math.random() * 6) + 1; }

        function evaluateHand(dice, canStraight = true) {
            let d = [...dice].sort((a, b) => b - a); 
            let str = d.join('');
            
            if (str === "111") return 10000; 
            if (d[1] === 1 && d[2] === 1) return 9000 + d[0];  
            if (d[0] === d[1] && d[1] === d[2]) return 8000 + d[0]; 
            
            if (canStraight) {
                if (str === "654") return 7006; 
                if (str === "543") return 7005;
                if (str === "432") return 7004;
                if (str === "321") return 7003;
            }
            return parseInt(str); 
        }

        function getTableTarget(playersData) {
            let targetScore = 0;
            let targetRolls = 3;
            for (let p of playersData) {
                if (p.knownDice.includes(0)) continue; 
                if (p.currentRolls === 0) continue; 
                let s = evaluateHand(p.knownDice, p.currentRolls <= 1);
                if (s > targetScore || (s === targetScore && p.currentRolls < targetRolls)) {
                    targetScore = s;
                    targetRolls = p.currentRolls;
                }
            }
            return { score: targetScore, rolls: targetRolls };
        }

        function simulatePlayerPlay(knownDice, currentRolls, maxRolls, targetObj, forceStand = false) {
            let dice = [...knownDice];
            let rollsTaken = currentRolls;

            let zeros = dice.filter(x => x === 0).length;
            let canStraight = (zeros === 0 || zeros === 3); 

            for(let i=0; i<3; i++) {
                if(dice[i] === 0) dice[i] = rollDie();
            }
            if (rollsTaken === 0) rollsTaken = 1;

            if (forceStand) return { score: evaluateHand(dice, canStraight), rollsTaken: rollsTaken };

            while (rollsTaken < maxRolls) {
                let score = evaluateHand(dice, canStraight);
                if (score === 10000) break; 

                if (score >= 7000) {
                    let winningBoard = false;
                    if (score > targetObj.score) winningBoard = true;
                    if (score === targetObj.score && rollsTaken < targetObj.rolls) winningBoard = true;
                    if (winningBoard) break;
                }

                let c1 = dice.filter(x=>x===1).length;
                let c6 = dice.filter(x=>x===6).length;
                let keptCount = 0;
                
                if (c6 === 3) {
                    dice = [1, 1, rollDie()]; rollsTaken++; canStraight = false; continue;
                }
                if (c6 === 2) {
                    let kept = [1]; keptCount++;
                    if (c1 > 0) { kept.push(1); keptCount++; }
                    while(kept.length < 3) kept.push(rollDie()); 
                    dice = kept; rollsTaken++; canStraight = false; continue;
                }

                let newDice = [];
                if (c1 > 0) {
                    for(let i=0; i<3; i++) {
                        if (dice[i] === 1) { newDice.push(1); keptCount++; }
                        else { newDice.push(rollDie()); }
                    }
                } else {
                    newDice = [rollDie(), rollDie(), rollDie()];
                    keptCount = 0; 
                }
                
                dice = newDice;
                canStraight = (keptCount === 0); 
                rollsTaken++;
            }
            return { score: evaluateHand(dice, canStraight), rollsTaken: rollsTaken };
        }

        function getHandNameHtml(dice, currentRolls) {
            if (dice.includes(0)) return "🎲 <b>Verdeckter Wurf</b>";
            
            let d = [...dice].sort((a,b) => b-a);
            let str = d.join('');
            let c1 = dice.filter(x=>x===1).length;
            let c5 = dice.filter(x=>x===5).length;

            if (str === "111") return "💥 <b>Schock Aus!</b>";
            if (str === "211") return "🙄 <b>Schock Doof (1-1-2)</b>";
            if (c1 === 2) return `🔥 <b>Schock ${d[0]}</b>`;
            if (c5 === 2 && currentRolls <= 1 && c1 === 0) return "💪 <b>Zwei 5en im ersten verlieren nie!</b>";
            if (c1 === 0 && d[0] === d[1] && d[1] === d[2]) return `🎉 <b>Geil, eine ${d[0]}er Uschi / Jenny!</b>`;
            if (str === "631") return "🇧🇬 <b>Bulgarische Straße (1-3-6)</b>";
            
            let isStraight = (str === "654" || str === "543" || str === "432" || str === "321");
            if (isStraight) {
                return currentRolls <= 1 ? "🛣️ <b>Hand-Straße</b>" : "🛣️ <b>Straße</b>";
            }
            
            if (c1 === 0 && d[0] !== d[1] && d[1] !== d[2] && d[0] !== d[2]) {
                return "🇵🇱 <b>Polnische Straße</b> (absoluter Schmutz)";
            }
            
            if (d[0] === d[1] || d[1] === d[2]) {
                let pair = d[0] === d[1] ? d[0] : d[1];
                return `🎲 <b>${pair}er-Pasch</b>`;
            }

            return `🔢 <b>Hausnummer: ${str}</b>`;
        }

        function getActionableAdvice(dice, currentRolls, maxRolls) {
            let d = [...dice].sort((a,b) => b-a);
            let str = d.join('');
            let c1 = dice.filter(x=>x===1).length;
            let c6 = dice.filter(x=>x===6).length;

            if (c1 === 3) return "Mach gar nichts, du hast die Halbzeit sicher!";
            if (str === "211") return "Behalte die 1er und wirf die 2 neu, um auf einen besseren Schock zu spielen.";
            if (c6 === 3) return "Pflichtzug: Drehe die drei 6er zu zwei 1ern!";
            if (c6 === 2) {
                if (c1 === 1) return "Drehe die beiden 6er zu einer 1. Zusammen mit der 1, die du schon hast, hältst du dann zwei 1er.";
                return "Drehe die beiden 6er zu einer 1. Behalte diese 1 und würfle die anderen beiden Würfel neu.";
            }
            if (c1 === 2) return `Behalte die beiden 1er und würfle die ${d[0]} neu.`;
            if (c1 === 1) {
                if (str === "631") return "Sieht lustig aus, bringt aber nix. Behalte die 1 und wirf 3 und 6 neu!";
                if (d[0] === d[1] || d[1] === d[2]) return "Ganz klar: Löse den Pasch auf! Schock ist wichtiger als Uschi. Behalte die 1 und wirf den Rest neu.";
                return "Solide Basis. Behalte die 1 und wirf die beiden anderen Würfel neu!";
            }
            
            if (d[0] === d[1] && d[1] === d[2]) return "Da man nur 1er liegen lassen darf, müsstest du für eine Verbesserung alles neu werfen. (Solltest du aber nur tun, wenn der Tisch dich zwingt!)";
            if (currentRolls <= 1 && ["654","543","432","321"].includes(str)) return "Das ist oft ein sehr sicherer Wurf. Wenn du ihn auflöst, dann komplett neu!";
            
            return "Da du keine 1 hast, musst du volles Risiko gehen: Alle drei Würfel komplett neu werfen!";
        }

        function runSimBatch(simulations, playersData, maxRolls, myIndex, forceMyStand, targetObj) {
            let myWins = 0; let myLosses = 0;
            const playerCount = playersData.length;

            for (let sim = 0; sim < simulations; sim++) {
                let results = [];
                for (let p = 0; p < playerCount; p++) {
                    let pData = playersData[p];
                    let forceStand = (p === myIndex) ? forceMyStand : false;
                    let simResult = simulatePlayerPlay(pData.knownDice, pData.currentRolls, maxRolls, targetObj, forceStand);
                    results.push({ playerIndex: p, score: simResult.score, rolls: simResult.rollsTaken });
                }

                results.sort((a, b) => {
                    if (b.score !== a.score) return b.score - a.score;
                    if (a.rolls !== b.rolls) return a.rolls - b.rolls;
                    return a.playerIndex - b.playerIndex;
                });
                let winnerIndex = results[0].playerIndex;
                
                let loserResults = [...results].sort((a, b) => {
                    if (a.score !== b.score) return a.score - b.score;
                    if (b.rolls !== a.rolls) return b.rolls - a.rolls;
                    return b.playerIndex - a.playerIndex;
                });
                let loserIndex = loserResults[0].playerIndex;

                if (winnerIndex === myIndex) myWins++;
                if (loserIndex === myIndex) myLosses++;
            }
            return {
                winProb: (myWins / simulations) * 100,
                notLoseProb: ((simulations - myLosses) / simulations) * 100
            };
        }

        function startSimulation() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('resultsCard').style.display = 'none';
            setTimeout(runDualMonteCarlo, 50); 
        }

        function runDualMonteCarlo() {
            const playerCount = parseInt(document.getElementById('playerCount').value);
            const maxRolls = parseInt(document.getElementById('maxRolls').value);
            const myIndex = parseInt(document.querySelector('input[name="isMe"]:checked').value) - 1; 
            
            let playersData = [];
            let myDice = [];
            let myRolls = 0;

            for (let i = 1; i <= playerCount; i++) {
                const row = document.getElementById(`playerRow${i}`);
                const d1 = parseInt(row.querySelector('.d1').value);
                const d2 = parseInt(row.querySelector('.d2').value);
                const d3 = parseInt(row.querySelector('.d3').value);
                const rolls = parseInt(row.querySelector('.roll-count').value);
                
                playersData.push({ knownDice: [d1, d2, d3], currentRolls: rolls });
                
                if ((i - 1) === myIndex) {
                    myDice = [d1, d2, d3];
                    myRolls = rolls;
                }
            }

            let targetObj = getTableTarget(playersData);

            let resPlay = runSimBatch(5000, playersData, maxRolls, myIndex, false, targetObj);
            let resStand = runSimBatch(5000, playersData, maxRolls, myIndex, true, targetObj);

            let hasOpenDice = myDice.includes(0);
            let canRoll = myRolls < maxRolls;
            let adviceHtml = "";
            let finalNotLoseProb = 0;
            let finalWinProb = 0;

            document.getElementById('handNameDisplay').innerHTML = getHandNameHtml(myDice, myRolls);

            if (hasOpenDice || !canRoll) {
                document.getElementById('splitMode').style.display = 'none';
                document.getElementById('singleMode').style.display = 'block';

                if (hasOpenDice) {
                    adviceHtml = canRoll ? "Du hast noch unbekannte Würfel. Hier sind deine Chancen, basierend auf den möglichen Ausgängen!" : "Du hast deinen letzten Wurf gemacht, aber noch nicht alle Würfel aufgedeckt. Die Simulation zeigt dir, was unter dem Becher noch möglich ist!";
                } else {
                    adviceHtml = "Du hast keine Würfe mehr übrig. Daumen drücken, dass es reicht!";
                }
                
                finalNotLoseProb = resPlay.notLoseProb;
                finalWinProb = resPlay.winProb;
                document.getElementById('probWinSingle').innerText = resPlay.winProb.toFixed(1) + ' %';
                document.getElementById('probNotLoseSingle').innerText = resPlay.notLoseProb.toFixed(1) + ' %';

            } else {
                document.getElementById('singleMode').style.display = 'none';
                document.getElementById('splitMode').style.display = 'block';

                document.getElementById('probNotLoseCurrent').innerText = resStand.notLoseProb.toFixed(1) + ' %';
                document.getElementById('probNotLosePotential').innerText = resPlay.notLoseProb.toFixed(1) + ' %';
                
                document.getElementById('probWinCurrent').innerText = resStand.winProb.toFixed(1) + ' %';
                document.getElementById('probWinPotential').innerText = resPlay.winProb.toFixed(1) + ' %';

                let notLoseDiff = resStand.notLoseProb - resPlay.notLoseProb;
                let winDiff = resPlay.winProb - resStand.winProb;
                let recommendStand = false;

                if (notLoseDiff >= 2.0) recommendStand = true; 
                else if (winDiff >= 1.0) recommendStand = false; 
                else if (notLoseDiff >= 0) recommendStand = true; 
                else recommendStand = false;

                if (recommendStand) {
                    adviceHtml = `<b>Die Mathematik sagt: STEHEN LASSEN!</b><br>Dein oberstes Ziel ist es, nicht zu verlieren. Weiterwürfeln kostet dich nur einen Wurf, was bei Gleichstand wegen <b>Mid is SHIT!</b> dein absoluter Ruin sein kann!`;
                    finalNotLoseProb = resStand.notLoseProb;
                    finalWinProb = resStand.winProb;
                } else {
                    let action = getActionableAdvice(myDice, myRolls, maxRolls);
                    adviceHtml = `<b>Die Mathematik sagt: WEITER WÜRFELN!</b><br>${action}<br><br><b>Und nicht vergessen: Schocken heißt das Spiel!</b>`;
                    finalNotLoseProb = resPlay.notLoseProb;
                    finalWinProb = resPlay.winProb;
                }
            }

            if (!hasOpenDice) {
                let myScore = evaluateHand(myDice, myRolls <= 1);
                for (let p = 0; p < myIndex; p++) {
                    let prevPlayer = playersData[p];
                    if (!prevPlayer.knownDice.includes(0) && prevPlayer.currentRolls > 0) {
                        let prevScore = evaluateHand(prevPlayer.knownDice, prevPlayer.currentRolls <= 1);
                        if (myScore === prevScore && myRolls >= prevPlayer.currentRolls) {
                            adviceHtml += `<br><br><b style="color: var(--danger); font-size: 1.2em;">Achtung: Mid is SHIT!</b><br>Du hast denselben Wurf wie ein Spieler vor dir, aber nicht weniger Würfe gebraucht. Da heißt es ganz klar: Mid is SHIT, du verlierst gegen ihn!`;
                            break; 
                        }
                    }
                }
            }

            // ROAST-STATION
            if (finalNotLoseProb < 50.0) {
                let randomRoast = roasts[Math.floor(Math.random() * roasts.length)];
                let roastText = `Ganz ehrlich: ${randomRoast}`;
                
                // Absolute Höchststrafe: IN DEN POOL!
                if (Math.random() > 0.4 || finalNotLoseProb < 20.0) {
                    roastText += ` <br><br><span class="pool-alert">In den Pool! In den Pool! In den Pool!</span>`;
                }

                adviceHtml += `<div class="roast-text">${roastText}</div>`;
            } else if (finalWinProb < 15.0 && finalNotLoseProb >= 50.0) {
                adviceHtml += `<div class="roast-text" style="color: var(--warning);">Dein Wurf ist eigentlich purer Schmutz. Aber die Mathematik lügt nicht: Bei so vielen Spielern gibt es fast immer einen Idioten, der noch dümmer würfelt und dir den Deckel erspart. Duck dich weg und bete!</div>`;
            } else {
                adviceHtml += `<div class="roast-text" style="color: var(--accent);">Gute Überlebenschance! Lass dir das jetzt nicht mehr vom Brot nehmen.</div>`;
            }

            document.getElementById('adviceText').innerHTML = adviceHtml;
            document.getElementById('adviceBox').style.display = 'block';
            document.getElementById('loading').style.display = 'none';
            document.getElementById('resultsCard').style.display = 'block';
        }
    </script>
</body>
</html>
